name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, I expect Y, but Z happens instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `pad create task "test"`
        2. Open the web UI
        3. Click on the task
        4. See error...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI
        - Web UI
        - API
        - Agent Skill
        - Other

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Pad version, browser (if web UI)
      placeholder: |
        - OS: macOS 15.2
        - Pad version: v0.1.0
        - Browser: Chrome 130 (if web UI issue)
