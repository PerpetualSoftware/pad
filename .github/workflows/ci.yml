name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Create web build placeholder for embed
        run: mkdir -p web/build && echo "placeholder" > web/build/.gitkeep

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Run tests with race detector
        if: github.ref == 'refs/heads/main'
        run: go test -race ./...

      - name: Build binary
        run: go build -o pad ./cmd/pad

      - name: Verify binary runs
        run: ./pad --help

  go-postgres:
    name: Go (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pad
          POSTGRES_PASSWORD: pad
          POSTGRES_DB: pad
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pad"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Create web build placeholder for embed
        run: mkdir -p web/build && echo "placeholder" > web/build/.gitkeep

      - name: Run tests against PostgreSQL
        env:
          PAD_TEST_POSTGRES_URL: "postgres://pad:pad@localhost:5432/pad?sslmode=disable"
        run: go test ./... -count=1

      - name: Run tests with race detector against PostgreSQL
        if: github.ref == 'refs/heads/main'
        env:
          PAD_TEST_POSTGRES_URL: "postgres://pad:pad@localhost:5432/pad?sslmode=disable"
        run: go test -race ./... -count=1

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check (svelte-check)
        run: npm run check
