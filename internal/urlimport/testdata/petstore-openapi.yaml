openapi: 3.0.0
info:
  title: Swagger Petstore
  description: |
    A sample API that uses a petstore as an example to demonstrate features in the OpenAPI 3.0 specification.
  version: 1.0.0
  contact:
    name: Petstore Team
    email: petstore@example.com
    url: https://petstore.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://petstore.example.com/v1
    description: Production server
  - url: https://staging.petstore.example.com/v1
    description: Staging server
tags:
  - name: pets
    description: Operations on pets
  - name: store
    description: Operations on the store
paths:
  /pets:
    get:
      summary: List pets
      description: Returns all pets, optionally filtered by status.
      operationId: listPets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: Max number of results to return.
          required: false
          schema:
            type: integer
            format: int32
        - name: status
          in: query
          description: Filter by status (e.g. `available`).
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Bad request.
    post:
      summary: Create a pet
      operationId: createPet
      tags:
        - pets
      requestBody:
        required: true
        description: The pet to create.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
            example:
              id: 42
              name: Rex
              status: available
      responses:
        '201':
          description: Pet created.
        '400':
          description: Validation failed.
  /pets/{petId}:
    get:
      summary: Get a pet by ID
      operationId: getPetById
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The pet's ID.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: A single pet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Not found.
  /store/orders:
    post:
      summary: Place an order
      operationId: placeOrder
      tags:
        - store
      deprecated: true
      responses:
        '200':
          description: Order placed.
components:
  schemas:
    Pet:
      type: object
      description: A pet for sale.
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier.
        name:
          type: string
          description: The pet's name.
        status:
          type: string
          description: One of `available`, `pending`, `sold`.
        tags:
          type: array
          items:
            type: string
    Order:
      type: object
      properties:
        id:
          type: integer
        petId:
          type: integer
