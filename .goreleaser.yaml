version: 2

before:
  hooks:
    # Build web UI before Go compilation so it gets embedded.
    # v2 accepts simple string hooks only at this level; object-with-cmd
    # form (v1 syntax) is rejected with "cannot unmarshal !!map into string".
    - bash -c "cd web && npm ci && npm run build"

builds:
  - main: ./cmd/pad
    binary: pad
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildTime={{.Date}}

archives:
  - formats: ["tar.gz"]
    name_template: "pad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

# SPDX SBOM for every archive artifact. Generated by syft, which GoReleaser
# invokes if the binary is on $PATH; the release workflow installs it via
# anchore/sbom-action before `goreleaser release` runs.
sboms:
  - artifacts: archive
    documents:
      - "${artifact}.spdx.json"

# Keyless cosign signing for checksums.txt. Uses Sigstore's public Fulcio
# CA + Rekor transparency log via GitHub Actions OIDC — no long-lived keys
# to store. Verify with:
#   cosign verify-blob --certificate-identity-regexp \
#     "^https://github.com/PerpetualSoftware/pad/.github/workflows/release.yml@.*" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     --bundle checksums.txt.cosign.bundle checksums.txt
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

# macOS code-signing + Apple notarization. Gated on MACOS_CERT_P12 being set
# so PR builds and snapshot mode don't fail when the cert isn't available
# (e.g. forks, local `goreleaser release --snapshot`). Uses GoReleaser v2's
# built-in Anchore/Quill backend — no external tools required on the runner.
# The .p12 cert and .p8 notary key are both supplied as base64-encoded
# strings via repo secrets; Quill decodes them in-process.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_CERT_P12" }}'
      sign:
        certificate: "{{ .Env.MACOS_CERT_P12 }}"
        password: "{{ .Env.MACOS_CERT_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY_P8 }}"
        wait: true
        timeout: 20m

# Keyless cosign signing for every container image manifest.
docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}@${digest}"
    artifacts: manifests
    output: true

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^Merge pull request"
      - "^Merge branch"
  groups:
    # NOTE: with `use: github`, entries are prefixed with the commit hash
    # (e.g. `abc1234: feat(...): ...`), so the regexes allow any prefix
    # before the conventional-commit type.
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?!?:'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\(.+\))?!?:'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\(.+\))?!?:'
      order: 2
    - title: "Refactors"
      regexp: '^.*?refactor(\(.+\))?!?:'
      order: 3
    - title: "Other changes"
      order: 999

homebrew_casks:
  - repository:
      owner: PerpetualSoftware
      name: homebrew-tap
      # Cross-repo PAT — the default GITHUB_TOKEN is scoped to PerpetualSoftware/pad
      # only and cannot push to the separate tap repo. Set the secret
      # `HOMEBREW_TAP_GITHUB_TOKEN` on this repo (fine-grained PAT,
      # `Contents: write` + `Metadata: read` on PerpetualSoftware/homebrew-tap only).
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://getpad.dev"
    description: "Collaborate with your AI agents"
    license: "Apache-2.0"

# dockers_v2 replaces the legacy `dockers:` + `docker_manifests:` blocks.
# A single declaration handles multi-platform builds via buildx; goreleaser
# pre-organizes binaries under `${TARGETPLATFORM}/pad` for the Dockerfile
# to consume (see Dockerfile.goreleaser's COPY line).
dockers_v2:
  - images:
      - "ghcr.io/perpetualsoftware/pad"
    tags:
      - "{{ .Version }}"
      - "latest"
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - web/build
    platforms:
      - linux/amd64
      - linux/arm64

release:
  github:
    owner: PerpetualSoftware
    name: pad
  draft: false
  prerelease: auto
  name_template: "Pad v{{.Version}}"
