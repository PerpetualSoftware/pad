version: 2

before:
  hooks:
    # Build web UI before Go compilation so it gets embedded.
    # v2 accepts simple string hooks only at this level; object-with-cmd
    # form (v1 syntax) is rejected with "cannot unmarshal !!map into string".
    - bash -c "cd web && npm ci && npm run build"

builds:
  - main: ./cmd/pad
    binary: pad
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildTime={{.Date}}

archives:
  - format: tar.gz
    name_template: "pad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

# SPDX SBOM for every archive artifact. Generated by syft, which GoReleaser
# invokes if the binary is on $PATH; the release workflow installs it via
# anchore/sbom-action before `goreleaser release` runs.
sboms:
  - artifacts: archive
    documents:
      - "${artifact}.spdx.json"

# Keyless cosign signing for checksums.txt. Uses Sigstore's public Fulcio
# CA + Rekor transparency log via GitHub Actions OIDC — no long-lived keys
# to store. Verify with:
#   cosign verify-blob --certificate-identity-regexp \
#     "^https://github.com/xarmian/pad/.github/workflows/release.yml@.*" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     --bundle checksums.txt.cosign.bundle checksums.txt
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

# Keyless cosign signing for every container image manifest.
docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}@${digest}"
    artifacts: manifests
    output: true

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^Merge pull request"
      - "^Merge branch"
  groups:
    # NOTE: with `use: github`, entries are prefixed with the commit hash
    # (e.g. `abc1234: feat(...): ...`), so the regexes allow any prefix
    # before the conventional-commit type.
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?!?:'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\(.+\))?!?:'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\(.+\))?!?:'
      order: 2
    - title: "Refactors"
      regexp: '^.*?refactor(\(.+\))?!?:'
      order: 3
    - title: "Other changes"
      order: 999

brews:
  - repository:
      owner: xarmian
      name: homebrew-tap
    directory: Formula
    homepage: "https://getpad.dev"
    description: "Project management for developers and AI agents"
    license: "Apache-2.0"
    test: |
      system "#{bin}/pad", "--version"

dockers:
  - image_templates:
      - "ghcr.io/xarmian/pad:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - web/build
  - image_templates:
      - "ghcr.io/xarmian/pad:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - web/build

docker_manifests:
  - name_template: "ghcr.io/xarmian/pad:{{ .Version }}"
    image_templates:
      - "ghcr.io/xarmian/pad:{{ .Version }}-amd64"
      - "ghcr.io/xarmian/pad:{{ .Version }}-arm64"
  - name_template: "ghcr.io/xarmian/pad:latest"
    image_templates:
      - "ghcr.io/xarmian/pad:{{ .Version }}-amd64"
      - "ghcr.io/xarmian/pad:{{ .Version }}-arm64"

release:
  github:
    owner: xarmian
    name: pad
  draft: false
  prerelease: auto
  name_template: "Pad v{{.Version}}"
