version: 2

before:
  hooks:
    # Build web UI before Go compilation so it gets embedded
    - cmd: bash -c "cd web && npm ci && npm run build"

builds:
  - main: ./cmd/pad
    binary: pad
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "pad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: xarmian
      name: homebrew-tap
    directory: Formula
    homepage: "https://getpad.dev"
    description: "Project management for developers and AI agents"
    license: "Apache-2.0"
    test: |
      system "#{bin}/pad", "--version"

dockers:
  - image_templates:
      - "ghcr.io/xarmian/pad:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - web/build
  - image_templates:
      - "ghcr.io/xarmian/pad:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - web/build

docker_manifests:
  - name_template: "ghcr.io/xarmian/pad:{{ .Version }}"
    image_templates:
      - "ghcr.io/xarmian/pad:{{ .Version }}-amd64"
      - "ghcr.io/xarmian/pad:{{ .Version }}-arm64"
  - name_template: "ghcr.io/xarmian/pad:latest"
    image_templates:
      - "ghcr.io/xarmian/pad:{{ .Version }}-amd64"
      - "ghcr.io/xarmian/pad:{{ .Version }}-arm64"

release:
  github:
    owner: xarmian
    name: pad
  draft: false
  prerelease: auto
  name_template: "Pad v{{.Version}}"
